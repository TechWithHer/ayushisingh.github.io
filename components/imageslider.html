<!-- ImageSlider.html -->
<section class="instagram-slider">
    <div class="slider-container">
        <div class="slider" id="slider"></div>
    </div>

    <!-- Lightbox Popup -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Enlarged Image">
    </div>
</section>

<script>
// List of image filenames (just names, keep them in the folder)
const images = [1,2,3,4,5,6,7,8]; // add more if needed
const slider = document.getElementById('slider');

images.forEach(num => {
    const img = document.createElement('img');
    img.src = `../images/HomePage Slider/${num}.jpg`;
    img.setAttribute('data-full-src', `../images/HomePage Slider/${num}-large.jpg`);
    img.alt = `Photo ${num}`;
    img.className = 'slider-image';
    img.onclick = () => openLightbox(img);
    slider.appendChild(img);
});

// Lightbox functions
function openLightbox(imgElement) {
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    lightboxImg.src = imgElement.getAttribute("data-full-src");
    lightbox.style.display = 'flex';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
}

// Slider Looping
let scrollInterval;
function startSliderLoop() {
    scrollInterval = setInterval(() => {
        slider.scrollBy({ left: 100, behavior: 'smooth' });
        if (slider.scrollLeft + slider.offsetWidth >= slider.scrollWidth) slider.scrollLeft = 0;
    }, 4000);
}
function stopSliderLoop() { clearInterval(scrollInterval); }

window.onload = () => {
    startSliderLoop();
    slider.addEventListener('mouseenter', stopSliderLoop);
    slider.addEventListener('mouseleave', startSliderLoop);
};
</script>

<style>
.instagram-slider {
	max-width: 100%;
	overflow: hidden;
}
.slider {
	display: flex;
	gap: 10px;
	transition: transform 0.5s ease-in-out;
}
.slider img {
	width: 150px;
	height: 150px;
	object-fit: cover;
	cursor: pointer;
	flex-shrink: 0;
	border-radius: 8px;
}
.lightbox {
	display: none;
	position: fixed;
	top: 0; left: 0;
	width: 100%; height: 100%;
	background-color: rgba(0, 0, 0, 0.8);
	justify-content: center; align-items: center;
	z-index: 1000;
}
.lightbox-content {
	max-width: 90%; max-height: 90%;
	border-radius: 8px;
}
.close {
	position: absolute; top: 20px; right: 30px;
	color: #fff; font-size: 40px; cursor: pointer;
}
</style>
