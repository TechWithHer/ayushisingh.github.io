<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayushi Singh</title>
<link rel="icon" href="/images/Favicon.png" type="image/png">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="css/styles.css">

<!-- JS Scripts -->
<script defer src="js/scripts.js"></script>
<script defer src="js/include.js"></script>
</head>

<body>

<!-- Navbar -->
<div include-html="components/navbar.html"></div>

<!-- Hero Section -->
<section class="hero text-center">
  <img src="images/Banners/6.jpg" alt="Hero Banner" class="hero-image">
  <div class="hero-content">
    <h1>Welcome to My World</h1>
    <p>Books, Insights, and Public Speaking on Human & AI Minds</p>
    <a href="projects.html" class="btn btn-primary mt-3">Explore Projects</a>
  </div>
</section>

<!-- Books Section -->
<section class="books py-5">
  <div class="container">
    <h2 class="text-center mb-4">My Books</h2>
    <div class="row g-4">
      <div class="col-md-3">
        <div class="card h-100 text-center">
          <img src="images/book1.png" class="card-img-top" alt="Child of True Lovers">
          <div class="card-body">
            <h5 class="card-title">Child of True Lovers</h5>
            <p class="card-text">You see the shadow of your personality in your child...</p>
            <a href="https://www.amazon.in/Child-True-Lovers-Ayushi-Singh/dp/B07L93Q6MH" target="_blank" class="btn btn-outline-primary">Read More</a>
          </div>
        </div>
      </div>

      <!-- Additional books can follow the same structure -->
    </div>
  </div>
</section>

<!-- Free Gift / CTA Section -->
<section class="cta text-center py-5 bg-light">
  <div class="container">
    <h3>Get Your Free E-Book</h3>
    <p>Tell us which book you want, and we’ll send it to you!</p>
    <a href="contact.html" class="btn btn-primary">Request Now</a>
  </div>
</section>

<!-- Footer -->
<div include-html="components/footer.html"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

</body>
</html>
