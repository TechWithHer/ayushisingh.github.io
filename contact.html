<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Ayushi Singh</title>
<link rel="icon" href="/images/Favicon.png" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="css/styles.css">
<script src="js/include.js" defer></script>
<script src="/js/scripts.js" defer></script>
</head>
<body>

<!-- Navbar -->
<div include-html="components/navbar.html"></div>

<!-- Hero Section -->
<section class="hero text-center position-relative">
  <img src="/images/Banners/6.jpg" alt="Contact Hero" class="img-fluid w-100 hero-image">
  <div class="hero-content position-absolute top-50 start-50 translate-middle text-white">
    <h1>Contact Me</h1>
    <p>Get in touch for collaborations, queries, or speaking engagements</p>
  </div>
</section>

<!-- Contact Form -->
<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <form>
        <div class="mb-3">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your Name">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" placeholder="name@example.com">
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="5" placeholder="Your message here..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Message</button>
      </form>
    </div>
  </div>
</main>

<!-- Footer -->
<div id="footer-placeholder"></div>
<script>
fetch('components/footer.html')
  .then(res => res.text())
  .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
