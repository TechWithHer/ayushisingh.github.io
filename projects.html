<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Ayushi Singh</title>
<link rel="icon" href="/images/Favicon.png" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="css/styles.css">
<script src="js/include.js" defer></script>
<script src="/js/scripts.js" defer></script>
</head>
<body>

<!-- Navbar -->
<div include-html="components/navbar.html"></div>

<!-- Hero Section -->
<section class="hero text-center position-relative">
  <img src="/images/Banners/6.jpg" alt="Projects Hero" class="img-fluid w-100 hero-image">
  <div class="hero-content position-absolute top-50 start-50 translate-middle text-white">
    <h1>Projects</h1>
    <p>Explore my technology and creative projects</p>
  </div>
</section>

<!-- Projects Grid -->
<main class="container py-5">
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card h-100 shadow-sm text-center">
        <img src="images/project1.png" class="card-img-top" alt="Project 1">
        <div class="card-body">
          <h5 class="card-title">Project One</h5>
          <p class="card-text">A web application built with modern JavaScript frameworks.</p>
          <a href="#" class="btn btn-outline-primary">View Project</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100 shadow-sm text-center">
        <img src="images/project2.png" class="card-img-top" alt="Project 2">
        <div class="card-body">
          <h5 class="card-title">Project Two</h5>
          <p class="card-text">An automation tool designed for DevOps workflows.</p>
          <a href="#" class="btn btn-outline-primary">View Project</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100 shadow-sm text-center">
        <img src="images/project3.png" class="card-img-top" alt="Project 3">
        <div class="card-body">
          <h5 class="card-title">Project Three</h5>
          <p class="card-text">A mobile app that improves user productivity.</p>
          <a href="#" class="btn btn-outline-primary">View Project</a>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Footer -->
<div id="footer-placeholder"></div>
<script>
fetch('components/footer.html')
  .then(res => res.text())
  .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

</html>
